name = "cuporacle-service"
main = "src/index.ts"
compatibility_date = "2024-12-24"
compatibility_flags = ["nodejs_compat"]

# 默认生产环境
[env.production]
name = "cuporacle-service"

# 预览环境（PR / preview branch）
[env.preview]
name = "cuporacle-service-preview"

# VAPID 配置（非敏感 - 公开信息）
# 私钥 / token / subject mailto 通过 wrangler secret put 注入
[vars]
VAPID_PUBLIC_KEY = "BPLxv2KyVuP3Op2MPbE7t9kmBPx1TeND1l6_jPY90OU5r1ij7mIfrxpeB6MIQ34zQS9hErXpf7iCXu28k2vP1iI"
VAPID_SUBJECT = "mailto:admin@cuporacle.com"

# 可选 KV / D1 / R2 绑定（先用占位；接 DB 后再开）
# [[kv_namespaces]]
# binding = "CACHE"
# id = "..."

# 计划：接 Cloudflare D1 存 matches / predictions
[[d1_databases]]
binding = "DB"
database_name = "cuporacle"
database_id = "7e4b4248-f9e6-4c10-a03f-0fed2e7cf4c3"

[observability]
enabled = true
