# Cloudflare Pages 配置
# 由 @cloudflare/next-on-pages 在构建时读取

name = "cuporacle"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# next-on-pages 输出目录（不要改）
pages_build_output_dir = ".vercel/output/static"

# 构建时暴露的公开变量(进 bundle,客户端可见)
# NEXT_PUBLIC_* 会在 next build 时被 inline 到 JS 里
[vars]
NEXT_PUBLIC_API_BASE = "https://cuporacle-service.song52wow.workers.dev"
# NEXT_PUBLIC_USE_MOCK = "0"

# 部署时 BUILD 命令（Cloudflare Dashboard 也要填这个）：
#   npm run pages:build