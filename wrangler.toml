# Cloudflare Pages 配置
# 由 @cloudflare/next-on-pages 在构建时读取

name = "cuporacle"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# next-on-pages 输出目录（不要改）
pages_build_output_dir = ".vercel/output/static"

# 如需 Cloudflare 缓存调优可放开：
# [vars]
# NEXT_PUBLIC_USE_MOCK = "0"

# 部署时 BUILD 命令（Cloudflare Dashboard 也要填这个）：
#   npm run pages:build